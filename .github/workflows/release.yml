name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate Cargo version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          if [[ "${tag}" == "${version}" ]]; then
            echo "Release tag must use the vX.Y.Z format." >&2
            exit 1
          fi

          if [[ "${version}" != "${cargo_version}" ]]; then
            echo "Release tag ${tag} does not match Cargo.toml version ${cargo_version}." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs:
      - validate
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.validate.outputs.version }}"
          target="${{ matrix.target }}"
          package_name="zembra-backend-rust-v${version}-${target}"
          package_dir="dist/${package_name}"

          mkdir -p "${package_dir}/config" "${package_dir}/supabase"
          cp "target/release/zembra-backend" "${package_dir}/"
          cp "config/default.toml" "${package_dir}/config/default.toml"
          cp ".env.example" "${package_dir}/.env.example"
          cp "LICENSE" "${package_dir}/LICENSE"
          cp -R "supabase/migrations" "${package_dir}/supabase/migrations"

          tar -czf "dist/${package_name}.tar.gz" -C "dist" "${package_name}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: zembra-backend-rust-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz \
            dist/SHA256SUMS
